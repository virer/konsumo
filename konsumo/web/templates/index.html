<!DOCTYPE html>
<html>
<head>
  <title>Konsumo Dashboard</title>
  <script src="/static/chart.js"></script>
  <style>
    .tabs {
      display: flex;
      margin-bottom: 10px;
      border-bottom: 1px solid #ccc;
    }
    .tab {
      padding: 10px 20px;
      cursor: pointer;
      border: 1px solid #ccc;
      border-bottom: none;
      background-color: #f0f0f0;
      margin-right: 5px;
      border-radius: 5px 5px 0 0;
    }
    .tab.active {
      background-color: white;
      font-weight: bold;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    canvas {
      max-width: 85%;
      max-height: 70vh;
      height: auto !important;
    }
  </style>
</head>
<body>
  <h1>Konsumo - Home Consumption</h1>


  
  <div class="tabs">
    <div class="tab active" onclick="switchTab('electricity')">Electricity</div>
    <div class="tab" onclick="switchTab('water')">Water</div>
    <div class="tab" onclick="switchTab('fuel')">Fuel</div>
    <div class="tab" onclick="switchTab('form')">+ Add Entry</div>
  </div>
  
  <div id="tab-electricity" class="tab-content active">
    <h2>Electricity Usage</h2>
    <canvas id="electricityChart"></canvas>
    <div id="electricityLatest" style="margin-top: 20px; padding: 15px; background-color: #f5f5f5; border-radius: 5px;"></div>
  </div>
  
  <div id="tab-water" class="tab-content">
    <h2>Water Usage</h2>
    <canvas id="waterChart"></canvas>
    <div id="waterLatest" style="margin-top: 20px; padding: 15px; background-color: #f5f5f5; border-radius: 5px;"></div>
  </div>
  
  <div id="tab-fuel" class="tab-content">
    <h2>Fuel Usage</h2>
    <canvas id="fuelChart"></canvas>
    <div id="fuelLatest" style="margin-top: 20px; padding: 15px; background-color: #f5f5f5; border-radius: 5px;"></div>
  </div>
  
  <div id="tab-form" class="tab-content">
    <h2>Add New Entry</h2>
    <form method="POST" action="/submit">
      <label>Date:</label>
      <input type="date" name="date" id="dateInput" required><br>

      <label>Category:</label>
      <select name="category" id="categorySelect" required onchange="onCategoryChange()">
        <option value="">-- Select --</option>
        <option value="water">Water</option>
        <option value="electricity">Electricity</option>
        <option value="fuel">Fuel</option>
      </select><br>

      <div id="waterFields" style="display: none;">
        Water (L): <input type="number" step="0.01" name="water"><br>
      </div>

      <div id="electricityFields" style="display: none;">
        Electricity Day (kWh): <input type="number" step="0.01" name="electricity_day"><br>
        Electricity Night (kWh): <input type="number" step="0.01" name="electricity_night"><br>
      </div>

      <div id="fuelFields" style="display: none;">
        Gasoline (L): <input type="number" step="0.01" name="gasoline"><br>
      </div>

      <button type="submit">Submit</button>
    </form>
  </div>


  <script>
    // Auto-fill today and restore form state from URL
    document.addEventListener("DOMContentLoaded", () => {
      const today = new Date().toISOString().split("T")[0];
      document.getElementById("dateInput").value = today;
      
      // Check URL parameters for tab and category
      const urlParams = new URLSearchParams(window.location.search);
      const tab = urlParams.get("tab");
      const category = urlParams.get("category");
      
      // Set category value first if present
      if (category) {
        const categorySelect = document.getElementById("categorySelect");
        categorySelect.value = category;
      }
      
      if (tab === "form") {
        switchTab("form");
      }
    });
  
    function onCategoryChange() {
      const category = document.getElementById("categorySelect").value;
      document.getElementById("waterFields").style.display = (category === "water") ? "block" : "none";
      document.getElementById("electricityFields").style.display = (category === "electricity") ? "block" : "none";
      document.getElementById("fuelFields").style.display = (category === "fuel") ? "block" : "none";
    }
  
    // Tab switching logic
    function switchTab(tabName) {
      const contents = document.querySelectorAll(".tab-content");
      const tabs = document.querySelectorAll(".tab");
      contents.forEach(c => c.classList.remove("active"));
      tabs.forEach(t => t.classList.remove("active"));
      
      document.getElementById("tab-" + tabName).classList.add("active");
      tabs.forEach(tab => {
        if (tab.textContent.toLowerCase().includes(tabName)) {
          tab.classList.add("active");
        }
      });
      
      // If switching to form tab, ensure category fields are shown if category is selected
      if (tabName === "form") {
        const categorySelect = document.getElementById("categorySelect");
        if (categorySelect && categorySelect.value) {
          onCategoryChange();
        }
      }
    }
  
    // Get pre-aggregated data from backend
    const chartData = {{ marshal . }};
    const entries = chartData.entries || [];
    
    // Month names for labels
    const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    
    // Color palette for different years
    const yearColors = [
      "rgb(255, 99, 132)",   // red
      "rgb(54, 162, 235)",   // blue
      "rgb(255, 206, 86)",   // yellow
      "rgb(75, 192, 192)",   // teal
      "rgb(153, 102, 255)",  // purple
      "rgb(255, 159, 64)",   // orange
      "rgb(199, 199, 199)",  // grey
      "rgb(83, 102, 255)",   // indigo
      "rgb(255, 99, 255)",   // pink
      "rgb(99, 255, 132)"    // green
    ];
  
    // Helper function to create chart datasets from aggregated data
    function createDatasets(dataByYear, colorIndex) {
      const years = Object.keys(dataByYear).sort();
      return years.map((year, idx) => {
        const yearData = dataByYear[year] || [];
        return {
          label: year,
          data: yearData.map(point => ({
            x: point.month,
            y: point.rate
          })),
          borderColor: yearColors[(colorIndex + idx) % yearColors.length],
          fill: false,
          borderWidth: 2
        };
      });
    }
    
    // Electricity chart
    const electricityDatasets = createDatasets(chartData.electricity || {}, 0);
    new Chart(document.getElementById("electricityChart"), {
      type: "line",
      data: {
        datasets: electricityDatasets
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        aspectRatio: 2,
        scales: {
          x: {
            type: "linear",
            position: "bottom",
            title: {
              display: true,
              text: "Month"
            },
            min: 1,
            max: 12,
            ticks: {
              stepSize: 1,
              callback: function(value) {
                const month = Math.round(value);
                if (month >= 1 && month <= 12) {
                  return monthNames[month - 1];
                }
                return "";
              }
            }
          },
          y: {
            beginAtZero: true,
            title: {
              display: true,
              text: "kWh/Day"
            }
          }
        }
      }
    });
  
    // Water chart
    const waterDatasets = createDatasets(chartData.water || {}, 1);
    new Chart(document.getElementById("waterChart"), {
      type: "line",
      data: {
        datasets: waterDatasets
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        aspectRatio: 2,
        scales: {
          x: {
            type: "linear",
            position: "bottom",
            title: {
              display: true,
              text: "Month"
            },
            min: 1,
            max: 12,
            ticks: {
              stepSize: 1,
              callback: function(value) {
                const month = Math.round(value);
                if (month >= 1 && month <= 12) {
                  return monthNames[month - 1];
                }
                return "";
              }
            }
          },
          y: {
            beginAtZero: true,
            title: {
              display: true,
              text: "Liters/Day"
            }
          }
        }
      }
    });

    // Fuel chart
    const fuelDatasets = createDatasets(chartData.fuel || {}, 2);
    new Chart(document.getElementById("fuelChart"), {
      type: "line",
      data: {
        datasets: fuelDatasets
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        aspectRatio: 2,
        scales: {
          x: {
            type: "linear",
            position: "bottom",
            title: {
              display: true,
              text: "Month"
            },
            min: 1,
            max: 12,
            ticks: {
              stepSize: 1,
              callback: function(value) {
                const month = Math.round(value);
                if (month >= 1 && month <= 12) {
                  return monthNames[month - 1];
                }
                return "";
              }
            }
          },
          y: {
            beginAtZero: true,
            title: {
              display: true,
              text: "Liters/Day"
            }
          }
        }
      }
    });

    // Display latest data points
    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function formatNumber(num) {
      return num.toFixed(2);
    }

    // Electricity latest data (3 latest entries)
    if (chartData.latest_electricity && chartData.latest_electricity.length > 0) {
      let html = '<h3>Latest 3 Data Points:</h3>';
      chartData.latest_electricity.forEach((point, index) => {
        const dateStr = formatDate(point.date);
        const valueStr = formatNumber(point.value);
        const dailyStr = formatNumber(point.daily_consumption);
        html += `<div style="margin-bottom: 10px; padding: 10px; background-color: white; border-left: 3px solid #36A2EB;">
          <strong>${index + 1}. Date:</strong> ${dateStr}<br>
          <strong>Reading:</strong> ${valueStr} kWh (Day + Night)<br>
          <strong>Daily Consumption:</strong> ${dailyStr} kWh/day
        </div>`;
      });
      document.getElementById("electricityLatest").innerHTML = html;
    }

    // Water latest data (3 latest entries)
    if (chartData.latest_water && chartData.latest_water.length > 0) {
      let html = '<h3>Latest 3 Data Points:</h3>';
      chartData.latest_water.forEach((point, index) => {
        const dateStr = formatDate(point.date);
        const valueStr = formatNumber(point.value);
        const dailyStr = formatNumber(point.daily_consumption);
        html += `<div style="margin-bottom: 10px; padding: 10px; background-color: white; border-left: 3px solid #4BC0C0;">
          <strong>${index + 1}. Date:</strong> ${dateStr}<br>
          <strong>Reading:</strong> ${valueStr} L<br>
          <strong>Daily Consumption:</strong> ${dailyStr} L/day
        </div>`;
      });
      document.getElementById("waterLatest").innerHTML = html;
    }

    // Fuel latest data (3 latest entries)
    if (chartData.latest_fuel && chartData.latest_fuel.length > 0) {
      let html = '<h3>Latest 3 Data Points:</h3>';
      chartData.latest_fuel.forEach((point, index) => {
        const dateStr = formatDate(point.date);
        const valueStr = formatNumber(point.value);
        const dailyStr = formatNumber(point.daily_consumption);
        html += `<div style="margin-bottom: 10px; padding: 10px; background-color: white; border-left: 3px solid #FFCE56;">
          <strong>${index + 1}. Date:</strong> ${dateStr}<br>
          <strong>Reading:</strong> ${valueStr} L<br>
          <strong>Daily Consumption:</strong> ${dailyStr} L/day
        </div>`;
      });
      document.getElementById("fuelLatest").innerHTML = html;
    }

  </script>
  
  
</body>
</html>
